    // 改用桌面版同一張鑽石圖 (edf2b99c)，縮小顯示結果相同。
    const cardVipIconUnlocked = {
      ellipse: 'https://www.figma.com/api/mcp/asset/c99efbe7-fc66-4695-a6ac-e1fdf892e3a9',
      icon: 'https://www.figma.com/api/mcp/asset/edf2b99c-48b4-4fdb-9e7e-cd72185f42ea',
    };
    const cardVipIconLocked = {
      ellipse: 'https://www.figma.com/api/mcp/asset/3ea08a26-1eb0-4693-a56b-192ebde4c31b',
      icon: 'https://www.figma.com/api/mcp/asset/edf2b99c-48b4-4fdb-9e7e-cd72185f42ea',
    };

    function renderVipCard(card) {
      const icons = card.locked ? cardVipIconLocked : cardVipIconUnlocked;
      const tagClass = card.locked
        ? 'bg-brand-grey-02 text-brand-bg'
        : 'bg-gradient-to-b from-brand-secondary-01 to-brand-secondary-02 text-brand-bg';
      const rewardLabelClass = card.locked
        ? 'text-brand-grey-02'
        : 'bg-gradient-to-b from-brand-secondary-01 to-brand-secondary-02 bg-clip-text text-transparent';

      const progressRows = card.progress.map(([value, label]) => `
        <div class="flex h-[24px] items-center justify-end gap-brand-1">
          <p class="text-brand-h5 font-medium capitalize text-brand-white whitespace-nowrap">${value}：${label}</p>
          <span class="flex size-[24px] items-center justify-center rounded-brand-4xl bg-brand-grey-01">
            <img src="${cardCheckIcon}" alt="" class="size-[12px]" />
          </span>
        </div>`).join('');

      const privilegeRows = privilegeItems.map(p => `
        <div class="flex w-full items-center justify-end gap-brand-1">
          <span class="shrink-0 rounded-brand-sm bg-gradient-to-b from-brand-yellow-02 to-brand-yellow-03 px-brand-1 py-[2px] text-brand-h7 font-medium text-brand-white whitespace-nowrap">${p.tag}</span>
          <p class="flex-1 text-right text-brand-h6 font-medium text-brand-white">${p.text}</p>
          <img src="${cardQuestionIcon}" alt="" class="size-[20px]" />
        </div>`).join('');

      return `
        <div class="flex w-[280px] shrink-0 flex-col items-center gap-brand-3 rounded-brand-xl border border-white/10 bg-gradient-to-b from-brand-grey-03 to-brand-bg px-brand-3 py-brand-4 backdrop-blur-[18px] md:w-[300px] ${card.locked ? 'opacity-50' : ''}">
          <div class="flex w-full flex-col items-start gap-brand-2">
            <div class="flex w-full items-start justify-between">
              <span class="rounded-brand-md px-brand-2 py-brand-2 text-brand-h5 font-extrabold italic ${tagClass}">${card.level}</span>
              <div class="relative h-[80px] w-[70px]">
                <img src="${icons.ellipse}" alt="" class="absolute left-1/2 top-0 size-[70px] -translate-x-1/2" />
                <img src="${icons.icon}" alt="" class="absolute left-1/2 top-1/2 h-[80px] w-[71px] -translate-x-1/2 -translate-y-1/2 object-cover" />
              </div>
            </div>
            <div class="flex w-full flex-col items-end text-right capitalize">
              <p class="w-full text-brand-h1 font-bold text-brand-white">${card.reward}</p>
              <p class="w-full text-brand-h5 font-medium ${rewardLabelClass}">升等獎勵</p>
            </div>
          </div>
          <div class="flex w-full flex-col items-end gap-brand-2">${progressRows}</div>
          <div class="flex w-full flex-col items-center gap-brand-2">
            <div class="flex w-full items-center justify-center gap-brand-2">
              <div class="h-px min-w-0 flex-1 bg-white/10"></div>
              <p class="shrink-0 bg-gradient-to-b from-brand-secondary-01 to-brand-secondary-02 bg-clip-text text-brand-h5 font-medium text-transparent whitespace-nowrap">VIP Privilege</p>
              <div class="h-px min-w-0 flex-1 bg-white/10"></div>
            </div>
            ${privilegeRows}
          </div>
        </div>`;
    }

    document.getElementById('vip-cards').innerHTML = vipCards.map(renderVipCard).join('');

    // ---- 排行榜資料（10 列，內容為設計稿預設佔位資料） ----
    const rankingRows = Array.from({ length: 10 }, () => ({
      win: '2.00', multiplier: '0.00x', bet: '2.00', player: '12xx456', game: 'Mafia mayhem',
      gameImg: 'https://www.figma.com/api/mcp/asset/e71901ce-1f94-477b-a07e-2d9868a7e6f2',
    }));

    // 桌面版：5 欄
    document.getElementById('ranking-rows-desktop').innerHTML = rankingRows.map(row => `
      <div class="flex h-[60px] w-full items-center border-t border-white/10 bg-gradient-to-b from-brand-grey-01 to-brand-bg px-brand-3">
        <div class="flex flex-1 items-center gap-brand-2">
          <span class="text-brand-h5 font-medium text-brand-white">EGP</span>
          <span class="text-brand-h5 font-medium text-brand-secondary-02">${row.win}</span>
        </div>
        <div class="flex-1 text-center text-brand-h5 font-medium text-brand-white">${row.multiplier}</div>
        <div class="flex flex-1 items-center justify-center gap-brand-2">
          <span class="text-brand-h5 font-medium text-brand-white">EGP</span>
          <span class="text-brand-h5 font-medium text-brand-white">${row.bet}</span>
        </div>
        <div class="flex-1 text-center text-brand-h5 font-medium text-brand-white">${row.player}</div>
        <div class="flex flex-1 items-center justify-end gap-brand-2">
          <span class="text-brand-h5 font-medium text-brand-white whitespace-nowrap">${row.game}</span>
          <img src="${row.gameImg}" alt="" class="size-[50px] rounded-[6.667px] object-cover" />
        </div>
      </div>`).join('');

    // 行動版：2 欄（贏分／遊戲）
    document.getElementById('ranking-rows-mobile').innerHTML = rankingRows.map(row => `
      <div class="flex h-[60px] w-full items-center justify-between border-t border-white/10 bg-gradient-to-b from-brand-grey-01 to-brand-bg px-brand-2">
        <div class="flex items-center gap-brand-1">
          <span class="text-brand-h5 font-medium text-brand-white">EGP</span>
          <span class="text-brand-h5 font-medium text-brand-secondary-02">${row.win}</span>
        </div>
        <div class="flex items-center justify-end gap-brand-1">
          <span class="text-brand-h5 font-medium text-brand-white whitespace-nowrap">${row.game}</span>
          <img src="${row.gameImg}" alt="" class="size-[50px] rounded-brand-md object-cover" />
        </div>
      </div>`).join('');
  </script>

</body>
</html>
