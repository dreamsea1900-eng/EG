<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>錢包 / 提款 — Withdraw</title>
<style>
  /* ============================================================
     Design System Tokens（對應 Figma Variables / collections.json）
     工程師可直接映射為 Tailwind theme tokens 或 CSS variables
     ============================================================ */
  :root {
    /* Brand Colors */
    --brand-bg: #1b1e28;
    --brand-grey-01: #323745;
    --brand-grey-02: #9aa3ba;
    --brand-grey-03: #212c3e;
    --brand-primary: #00deff;
    --brand-secondary-01: #fce405;
    --brand-secondary-02: #69d876;
    --brand-warn: #e53935;

    /* White Alpha Scale */
    --white-100: #ffffff;
    --white-50: rgba(255, 255, 255, 0.5);
    --white-40: rgba(255, 255, 255, 0.4);
    --white-20: rgba(255, 255, 255, 0.2);
    --white-10: rgba(255, 255, 255, 0.1);
    --white-05: rgba(255, 255, 255, 0.05);

    /* Radius */
    --radius-md: 8px;
    --radius-4xl: 216px;

    /* Spacing */
    --spacing-1: 4px;
    --spacing-2: 8px;
    --spacing-3: 16px;
    --spacing-4: 24px;

    /* Typography */
    --font-size-h4: 20px;  --line-height-h4: 28px;
    --font-size-h5: 16px;  --line-height-h5: 24px;
    --font-size-h6: 14px;  --line-height-h6: 20px;
    --font-size-h7: 12px;  --line-height-h7: 16px;

    --font-weight-regular: 400;
    --font-weight-medium: 500;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--brand-bg);
    color: var(--white-100);
    display: flex;
    justify-content: center;
  }

  /* ============================================================
     Screen Container
     shadcn/ui 對應：可視為頁面層級容器（無對應元件，直接用 div + Tailwind）
     ============================================================ */
  .screen {
    width: 375px;
    min-height: 100vh;
    background: var(--brand-bg);
    border: 1px solid var(--white-10);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--spacing-3);
    padding: var(--spacing-3);
  }

  /* ============================================================
     Top Bar — 關閉鈕 + 標題
     shadcn/ui 對應：Button(variant="ghost", size="icon") + 標題文字
     ============================================================ */
  .topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .btn-icon-close {
    position: absolute;
    left: 0;
    width: 30px;
    height: 30px;
    border-radius: var(--radius-4xl);
    background: rgba(0, 0, 0, 0.5);
    border: 0.6px solid var(--white-40);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--white-100);
  }
  .btn-icon-close svg { width: 14px; height: 14px; }
  .topbar-title {
    font-size: var(--font-size-h4);
    line-height: var(--line-height-h4);
    font-weight: var(--font-weight-regular);
    text-align: center;
  }

  /* ============================================================
     Tabs — 提款 / 存款
     shadcn/ui 對應：Tabs / TabsList / TabsTrigger
     ============================================================ */
  .tabs-list {
    width: 100%;
    display: flex;
    gap: 8px;
  }
  .tabs-trigger {
    flex: 1;
    height: 40px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-h6);
    line-height: var(--line-height-h6);
    cursor: pointer;
    box-shadow: 0 4px 4px 0 rgba(0, 0, 0, 0.25);
    border: 1px solid transparent;
  }
  .tabs-trigger[data-state="active"] {
    background: var(--brand-primary);
    color: var(--white-100);
  }
  .tabs-trigger[data-state="inactive"] {
    background: var(--white-05);
    border-color: var(--brand-grey-01);
    color: var(--white-100);
  }

  /* ============================================================
     Form Section
     shadcn/ui 對應：form + Label + Input
     ============================================================ */
  .form-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: var(--spacing-3);
  }
  .section-title {
    width: 100%;
    text-align: right;
    font-size: var(--font-size-h5);
    line-height: var(--line-height-h5);
    font-weight: var(--font-weight-regular);
    margin: 0;
  }
  .field {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: var(--spacing-1);
  }
  .field-label {
    width: 100%;
    text-align: right;
    font-size: var(--font-size-h6);
    line-height: var(--line-height-h6);
    font-weight: var(--font-weight-medium);
    color: var(--white-100);
  }
  .field-label-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--spacing-1);
  }
  .field-hint {
    font-size: var(--font-size-h6);
    line-height: var(--line-height-h6);
    color: var(--brand-grey-02);
  }
  .field-hint .hint-value { color: var(--brand-warn); }

  .input {
    width: 100%;
    height: 40px;
    background: var(--white-05);
    border: 1px solid var(--white-20);
    border-radius: var(--radius-md);
    padding: 0 var(--spacing-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--spacing-1);
    font-size: var(--font-size-h6);
    line-height: var(--line-height-h6);
    color: var(--white-100);
  }
  .input.is-error {
    border-color: var(--brand-warn);
    font-size: var(--font-size-h7);
    line-height: var(--line-height-h7);
  }
  .input input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white-100);
    font-family: inherit;
    font-size: inherit;
    text-align: right;
  }
  .bank-icon {
    width: 26px;
    height: 26px;
    border-radius: 100px;
    background: var(--white-100);
    overflow: hidden;
    flex-shrink: 0;
  }
  .bank-icon img { width: 100%; height: 100%; object-fit: cover; }

  .field-error {
    font-size: var(--font-size-h7);
    line-height: var(--line-height-h7);
    color: #ff3b30;
    text-align: right;
  }

  /* ============================================================
     Quick Amount Button Group
     shadcn/ui 對應：ToggleGroup / Button(variant="outline") 群組
     ============================================================ */
  .quick-amounts {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .btn-quick {
    flex: 1;
    min-width: 0;
    height: 40px;
    border-radius: var(--radius-md);
    border: 1px solid var(--white-10);
    background: linear-gradient(to bottom, var(--brand-grey-01), var(--brand-bg));
    color: var(--white-100);
    font-size: var(--font-size-h6);
    line-height: var(--line-height-h6);
    cursor: pointer;
  }
  .btn-quick[data-state="active"] {
    border-color: var(--brand-secondary-02);
    color: var(--brand-secondary-02);
  }

  /* ============================================================
     Primary CTA
     shadcn/ui 對應：Button(variant="default" / 客製 gradient)
     ============================================================ */
  .btn-primary {
    width: 100%;
    height: 40px;
    border-radius: var(--radius-md);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(to left, var(--brand-primary), #3a9ff3);
    color: var(--white-100);
    font-size: var(--font-size-h6);
    line-height: var(--line-height-h6);
    cursor: pointer;
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ============================================================
     Notice Card — 注意事項
     shadcn/ui 對應：Card / CardContent
     ============================================================ */
  .notice-card {
    width: 100%;
    background: var(--white-05);
    border-radius: var(--radius-md);
    padding: var(--spacing-2);
    backdrop-filter: blur(6px);
  }
  .notice-card * {
    font-size: var(--font-size-h7);
    line-height: var(--line-height-h7);
    color: var(--white-50);
  }
  .notice-card p { margin: 0; text-align: right; }
  .notice-card ol {
    margin: 0;
    padding-inline-start: 1.4em;
    text-align: right;
  }
  .notice-card a { color: var(--brand-primary); text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<!--
  ============================================================
  錢包 / 提款（Withdraw）介面
  來源 Figma node: 101:194（檔案 nVdOZ0m47ytmqdGAsSZ9G9）
  本檔案為交付用靜態 HTML，class 命名與結構對應 shadcn/ui 元件慣例，
  方便工程師後續替換為 <Button> <Input> <Tabs> <Card> 等實際元件。
  顏色 / 圓角 / 字級皆已對應 Design System Token（見 <style> 內 CSS 變數區）。
  ============================================================
-->
<main class="screen" data-name="Withdraw">

  <!-- Top Bar: 關閉鈕 + 標題 → shadcn Button(ghost, icon) -->
  <header class="topbar">
    <button class="btn-icon-close" aria-label="關閉" type="button">
      <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M4 4 L14 14 M14 4 L4 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </svg>
    </button>
    <h1 class="topbar-title">錢包</h1>
  </header>

  <!-- Tabs: 提款 / 存款 → shadcn Tabs / TabsList / TabsTrigger -->
  <nav class="tabs-list" role="tablist" aria-label="錢包功能切換">
    <button class="tabs-trigger" role="tab" data-state="active" aria-selected="true" type="button">提款</button>
    <button class="tabs-trigger" role="tab" data-state="inactive" aria-selected="false" type="button">存款</button>
  </nav>

  <!-- Form Section -->
  <section class="form-section" aria-label="提款表單">
    <p class="section-title">提款資訊</p>

    <!-- 銀行代碼 → shadcn Label + Input（含右側銀行圖示） -->
    <div class="field">
      <label class="field-label" for="bank-code">銀行代碼</label>
      <div class="input">
        <input id="bank-code" type="text" value="bank" readonly />
        <span class="bank-icon">
          <img src="https://www.figma.com/api/mcp/asset/ecee7b6e-5ed6-400f-9a0e-e4ba0d848aef" alt="Kasikorn Bank" />
        </span>
      </div>
    </div>

    <!-- 帳戶名稱 → shadcn Label + Input -->
    <div class="field">
      <label class="field-label" for="account-name">帳戶名稱</label>
      <div class="input">
        <input id="account-name" type="text" placeholder="" />
      </div>
    </div>

    <!-- 帳號 → shadcn Label + Input -->
    <div class="field">
      <label class="field-label" for="account-number">帳號</label>
      <div class="input">
        <input id="account-number" type="text" placeholder="" />
      </div>
    </div>

    <!-- 提款金額 → shadcn Label + Input(error state) + 錯誤訊息 -->
    <div class="field">
      <div class="field-label-row">
        <span class="field-hint"><span class="hint-value">200.00</span> ：最低</span>
        <label class="field-label" for="withdraw-amount" style="width:auto;">提款金額</label>
      </div>
      <div class="input is-error">
        <input id="withdraw-amount" type="number" value="0" aria-invalid="true" />
      </div>
      <p class="field-error">錯誤訊息顯示區</p>
    </div>

    <!-- 快速金額按鈕組 → shadcn ToggleGroup / Button(outline) -->
    <div class="quick-amounts" role="group" aria-label="快速選擇提款金額">
      <button class="btn-quick" type="button">max</button>
      <button class="btn-quick" type="button">50%</button>
      <button class="btn-quick" type="button">25%</button>
      <button class="btn-quick" data-state="active" type="button">min</button>
    </div>

    <!-- 主要 CTA → shadcn Button(default / gradient variant) -->
    <button class="btn-primary" type="submit" disabled>提款</button>

    <!-- 注意事項卡片 → shadcn Card / CardContent -->
    <div class="notice-card">
      <p>หมายเหตุ</p>
      <ol>
        <li>ถอนขั้นต่ำ 200.00 บาท</li>
        <li>
          สำหรับการถอนเงินที่มากกว่า 500,000.00 THB กรุณาติดต่อฝ่ายบริการลูกค้า
          <a href="https://line.me/R/ti/p/@201ludux?ts=09181739&oat_content=url" target="_blank" rel="noopener">คลิกที่นี่</a>
        </li>
        <li>ทำเทิร์นโอเวอร์ครบ 1 เท่าของยอดเงินที่ฝาก</li>
      </ol>
    </div>
  </section>

</main>
</body>
</html>
